  <script>
  fetch("footer.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });

  let filterLocked = false;

  function toggleFilterLock() {
    filterLocked = !filterLocked;
    updateMemberListDisplay();
  }

  function showMemberList() {
    if (!filterLocked) {
      document.getElementById('memberList').style.display = 'flex';
    }
  }

  function hideMemberList() {
    if (!filterLocked) {
      document.getElementById('memberList').style.display = 'none';
    }
  }

  function updateMemberListDisplay() {
    const memberList = document.getElementById('memberList');
    memberList.style.display = filterLocked ? 'flex' : 'none';
  }

  function filterSNS(member) {
    const entries = document.querySelectorAll('.sns-entry');
    const message = document.getElementById('noContentMessage');
    const backButton = document.getElementById('backButton');
    const nextButton = document.getElementById('nextButton');
    const footer = document.getElementById('footer');
    const currentFilter = document.getElementById('currentFilter');

    const memberNames = {
      all: '全部',
      bigbang: 'Bigbang全员',
      gd: 'G-Dragon',
      top: 'TOP',
      taeyang: '太阳',
      daesung: '大声',
      seungri: '胜利'
    };

    if (memberNames[member]) {
      currentFilter.textContent = `当前筛选：${memberNames[member]}`;
      currentFilter.style.display = 'block';
    } else {
      currentFilter.style.display = 'none';
    }

    let hasContent = false;

    entries.forEach(entry => {
      const members = entry.dataset.member.split(' ');
      if (member === 'all' || members.includes(member)) {
        entry.style.display = 'block';
        hasContent = true;
      } else {
        entry.style.display = 'none';
      }
    });

    if (!hasContent && member !== 'all') {
      if (message) message.style.display = 'block';
      if (backButton) backButton.style.display = 'none';
      if (nextButton) nextButton.style.display = 'none';
      if (footer) footer.style.display = 'none';
    } else {
      if (message) message.style.display = 'none';
      if (backButton) backButton.style.display = 'inline-block';
      if (nextButton) nextButton.style.display = 'inline-block';
      if (footer) footer.style.display = 'block';
    }
  }

const sliderStates = new Map();

function slide(button) {
  const container = button.closest('.slider-container');
  const slider = container.querySelector('.slider');
  const slides = slider.querySelectorAll('.slide-item');
  const isNext = button.classList.contains('right');
  const slideWidth = 500;

  let state = sliderStates.get(slider);
  if (state === undefined) {
    state = 0;
  }

  if (isNext) {
    state = (state + 1) % slides.length;
  } else {
    state = (state - 1 + slides.length) % slides.length;
  }

  sliderStates.set(slider, state);

  const offset = state * slideWidth;
  slider.style.transform = `translateX(-${offset}px)`;

  const counter = container.querySelector('.slide-counter');
  counter.textContent = `${state + 1}/${slides.length}`;
}

document.querySelectorAll('.slider-container').forEach(container => {
  const slides = container.querySelectorAll('.slide-item');
  const counter = container.querySelector('.slide-counter');

  counter.textContent = `1/${slides.length}`;
});

  </script>
